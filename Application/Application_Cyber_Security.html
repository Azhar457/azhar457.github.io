<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity & Homelab Arsenal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2 class="sr-only">Cybersecurity & Homelab Tools — Arsenal Belajar Lengkap</h2>

    <div class="roadmap-wrapper">
      <div class="header-row">
        <span class="header-title">// cyber.arsenal</span>
        <span class="header-subtitle">— dari fondasi networking sampai zero-trust security</span>
      </div>

      <div class="filter-row" id="filters">
        <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
        <button onclick="filter('fondasi')" data-cat="fondasi" class="fBtn">⬡ fondasi</button>
        <button onclick="filter('jaringan')" data-cat="jaringan" class="fBtn">⬡ jaringan</button>
        <button onclick="filter('identitas')" data-cat="identitas" class="fBtn">⬡ identitas</button>
        <button onclick="filter('keamanan')" data-cat="keamanan" class="fBtn">⬡ keamanan</button>
        <button onclick="filter('monitoring')" data-cat="monitoring" class="fBtn">⬡ monitoring</button>
        <button onclick="filter('data')" data-cat="data" class="fBtn">⬡ data & storage</button>
        <button onclick="filter('warning')" data-cat="warning" class="fBtn">⚠ warning zone</button>
        <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠ danger zone</button>
      </div>

      <input type="text" id="search" oninput="renderCards()" placeholder="cari tool..." class="search-input">

      <div id="stats"></div>
      <div id="grid"></div>
      <div id="empty">
        // no results found
      </div>

    </div>
  </div>

  <script src="arsenal.js"></script>

    const CATS = {
      fondasi: { label: "fondasi", border: "#888780", icon: "⬡" },

      danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
