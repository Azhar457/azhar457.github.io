<body>

    <h2 class="sr-only">DevOps & Cloud Infrastructure Tools — Arsenal Belajar Lengkap</h2>

    <div class="roadmap-wrapper">
      <div class="header-row">
        <span class="header-title">// devops.toolbox</span>
        <span class="header-subtitle">— dari container sampai cloud-native orchestration</span>
      </div>

        <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
        <button onclick="filter('container')" data-cat="container" class="fBtn">⬡ container</button>
        <button onclick="filter('cicd')" data-cat="cicd" class="fBtn">⬡ CI/CD</button>
        <button onclick="filter('iac')" data-cat="iac" class="fBtn">⬡ IaC</button>
        <button onclick="filter('orchestration')" data-cat="orchestration" class="fBtn">⬡ orchestration</button>
        <button onclick="filter('observability')" data-cat="observability" class="fBtn">⬡ observability</button>
        <button onclick="filter('networking')" data-cat="networking" class="fBtn">⬡ networking</button>

        <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠ danger zone</button>
      </div>

      <div id="stats"></div>
      <div id="grid"></div>
      <div id="empty">

      </div>

    </div>
  </div>

  <script src="arsenal.js"></script>

      container: { label: "container", border: "#378ADD", icon: "⬡" },
      cicd: { label: "CI/CD", border: "#639922", icon: "⬡" },

      orchestration: { label: "orchestration", border: "#7F77DD", icon: "⬡" },
      observability: { label: "observability", border: "#888780", icon: "⬡" },
      networking: { label: "networking", border: "#D85A30", icon: "⬡" },
      warning: { label: "⚠ warning zone", border: "#E24B4A", icon: "⚠" },
      danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
    };

    const TAG_MAP = {
      "ent→os": "tag-info",
      "powerful": "tag-warning",
      "cncf": "tag-success",
      "hashicorp": "tag-danger",
    };
