<!DOCTYPE html>
<html lang="id">

<head>

  <title>Offensive Security Arsenal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>

<body>
  <div class="container">
    <h2 class="sr-only">Offensive Security Tools — Arsenal Belajar Lengkap</h2>

    <div class="roadmap-wrapper">
      <div class="header-row">
        <span class="header-title">// offensive.arsenal</span>
        <span class="header-subtitle">— dari reconnaissance sampai advanced persistent threat simulation</span>
      </div>

      <div class="filter-row" id="filters">
        <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
        <button onclick="filter('recon')" data-cat="recon" class="fBtn">⬡ recon</button>
        <button onclick="filter('scanning')" data-cat="scanning" class="fBtn">⬡ scanning</button>
        <button onclick="filter('exploitation')" data-cat="exploitation" class="fBtn">⬡ exploitation</button>
        <button onclick="filter('post-exploit')" data-cat="post-exploit" class="fBtn">⬡ post-exploit</button>
        <button onclick="filter('web-app')" data-cat="web-app" class="fBtn">⬡ web-app</button>
        <button onclick="filter('wireless')" data-cat="wireless" class="fBtn">⬡ wireless</button>
        <button onclick="filter('warning')" data-cat="warning" class="fBtn">⚠ warning zone</button>
        <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠ danger zone</button>
      </div>

      <input type="text" id="search" oninput="renderCards()" placeholder="cari tool..." class="search-input">

      <div id="stats"></div>
      <div id="grid"></div>
      <div id="empty">
        // no results found
      </div>

    </div>
  </div>

  <script src="arsenal.js"></script>

      "web-app": { label: "web-app", border: "#BA7517", icon: "⬡" },

      danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
    };

      "cncf": "tag-success",
      "nsa": "tag-danger",
      "c2": "tag-danger",
      "osint": "tag-info",
      "hardware": "tag-warning",
      "custom": "tag-warning",
      "apt": "tag-danger",

    const tools = [
      // ⬡ RECONNAISSANCE

      { n: "Maltego", cat: "recon", d: 2, url: "https://www.maltego.com/", desc: "OSINT visualization platform — hubungkan entity (domain, IP, email, social media) dalam graph interaktif untuk melihat relasi tersembunyi.", tags: ["ent→os", "powerful"] },
      { n: "Recon-ng", cat: "recon", d: 2, url: "https://github.com/lanmaster53/recon-ng", desc: "Web reconnaissance framework — modular, database-backed, automate seluruh workflow OSINT dari satu console.", tags: ["osint", "powerful"] },

      { n: "SpiderFoot", cat: "recon", d: 2, url: "https://github.com/smicallef/spiderfoot", desc: "Automated OSINT collection — 200+ modules untuk gather data dari social media, dark web, breach database, dan threat intel feeds.", tags: ["osint", "powerful"] },

      { n: "GHunt", cat: "recon", d: 2, url: "https://github.com/mxrch/GHunt", desc: "Investigate Google Accounts — ekstrak metadata dari email Google, review Maps, Calendar, YouTube untuk profiling target.", tags: ["osint", "custom"] },

      { n: "Atomic Red Team", cat: "danger", d: 4, url: "https://github.com/redcanaryco/atomic-red-team", desc: "Library of tests mapped to MITRE ATT&CK — simulate TTPs nyata untuk validasi detection capability blue team.", tags: ["apt", "powerful"] },
