<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab & Cybersecurity Roadmap</title>
  
  <!-- Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
<!-- Original Code Begins Here -->
<h2 class="sr-only">Homelab & Cybersecurity Self-Hosted Tools — Roadmap Belajar Lengkap</h2>
<div class="roadmap-wrapper">

  <div class="header-row">
    <span class="header-title">//
      homelab.roadmap</span>
    <span class="header-subtitle">— semua gratis, semua bisa dipelajari sendiri</span>
  </div>

  <div class="filter-row" id="filters">
    <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
    <button onclick="filter('fondasi')" data-cat="fondasi" class="fBtn">⬡
      fondasi</button>
    <button onclick="filter('jaringan')" data-cat="jaringan" class="fBtn">⬡
      jaringan</button>
    <button onclick="filter('identitas')" data-cat="identitas" class="fBtn">⬡
      identitas & auth</button>
    <button onclick="filter('keamanan')" data-cat="keamanan" class="fBtn">⬡
      keamanan</button>
    <button onclick="filter('monitoring')" data-cat="monitoring" class="fBtn">⬡
      monitoring</button>
    <button onclick="filter('data')" data-cat="data" class="fBtn">⬡
      data & storage</button>
    <button onclick="filter('warning')" data-cat="warning" class="fBtn">⚠
      warning zone</button>
    <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠
      danger zone</button>
  </div>

  <input type="text" id="search" oninput="renderCards()" placeholder="cari tool...">

  <div id="stats"></div>

  <div id="grid"></div>

  <div id="empty">
    // no results found</div>

</div>

<script>
  const CATS = {
    fondasi: { label: "fondasi", border: "#888780", icon: "⬡" },
    jaringan: { label: "jaringan", border: "#378ADD", icon: "⬡" },
    identitas: { label: "identitas/auth", border: "#7F77DD", icon: "⬡" },
    keamanan: { label: "keamanan", border: "#D85A30", icon: "⬡" },
    monitoring: { label: "monitoring", border: "#639922", icon: "⬡" },
    data: { label: "data & storage", border: "#BA7517", icon: "⬡" },
    warning: { label: "⚠ warning zone", border: "#E24B4A", icon: "⚠" },
    danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
  };

  const TAG_STYLE = {
    "ent→os": "background:var(--color-background-info);color:var(--color-text-info)",
    "powerful": "background:var(--color-background-warning);color:var(--color-text-warning)",
    "cncf": "background:var(--color-background-success);color:var(--color-text-success)",
    "nsa": "background:var(--color-background-danger);color:var(--color-text-danger)",
  };

  const tools = [
    { n: "NixOS", cat: "fondasi", d: 2, desc: "OS deklaratif — seluruh sistem dikonfigurasi via satu file reproducible", tags: ["powerful"], url: "https://nixos.org/" },
    { n: "Proxmox VE", cat: "fondasi", d: 1, desc: "Hypervisor tipe-1 gratis untuk VM & LXC container — standar homelab", tags: ["ent→os"], url: "https://www.proxmox.com/" },
    { n: "TrueNAS SCALE", cat: "fondasi", d: 1, desc: "NAS OS berbasis Linux dengan ZFS, cocok untuk penyimpanan data jangka panjang", tags: ["ent→os"], url: "https://www.truenas.com/" },
    { n: "Portainer", cat: "fondasi", d: 1, desc: "GUI management Docker & Kubernetes — cocok untuk mulai tanpa hafal CLI", tags: [], url: "https://www.portainer.io/" },
    { n: "Traefik", cat: "fondasi", d: 2, desc: "Reverse proxy modern dengan auto-discovery container & otomasi TLS", tags: ["powerful"], url: "https://traefik.io/" },
    { n: "Nginx Proxy Manager", cat: "fondasi", d: 1, desc: "Reverse proxy berbasis Nginx dengan GUI simpel — alternatif Traefik yang lebih mudah", tags: [], url: "https://nginxproxymanager.com/" },
    { n: "Vaultwarden", cat: "fondasi", d: 1, desc: "Server Bitwarden self-hosted — password manager penuh fitur, hemat resource", tags: [], url: "https://github.com/dani-garcia/vaultwarden" },
    { n: "Forgejo", cat: "fondasi", d: 1, desc: "Self-hosted Git platform — fork community dari Gitea, bebas vendor lock-in", tags: [], url: "https://forgejo.org/" },
    { n: "Nextcloud", cat: "fondasi", d: 1, desc: "Private cloud: file sync, kalender, kontak, office suite — alternatif Google Workspace", tags: ["ent→os"], url: "https://nextcloud.com/" },
    { n: "Immich", cat: "fondasi", d: 1, desc: "Self-hosted Google Photos — backup foto/video otomatis dengan AI recognition", tags: [], url: "https://immich.app/" },
    { n: "Paperless-ngx", cat: "fondasi", d: 1, desc: "Document management dengan OCR & auto-tagging — arsip digital tanpa kertas", tags: [], url: "https://docs.paperless-ngx.com/" },
    { n: "Headscale", cat: "jaringan", d: 2, desc: "Self-hosted Tailscale control server — VPN mesh zero-config antar device manapun", tags: [], url: "https://github.com/juanfont/headscale" },
    { n: "OPNsense", cat: "jaringan", d: 2, desc: "Firewall & router OS berbasis FreeBSD — fitur enterprise: IDS, VPN, traffic shaping", tags: ["ent→os"], url: "https://opnsense.org/" },
    { n: "WireGuard", cat: "jaringan", d: 2, desc: "VPN protocol modern — kode minimal, kriptografi kuat, performa tinggi", tags: ["powerful"], url: "https://www.wireguard.com/" },
    { n: "Netbird", cat: "jaringan", d: 2, desc: "Zero-trust overlay network full self-hosted — seperti Tailscale tapi kontrol penuh", tags: [], url: "https://netbird.io/" },
    { n: "Cosmos Cloud", cat: "jaringan", d: 1, desc: "Homelab gateway all-in-one: reverse proxy + SSO + app store container", tags: [], url: "https://cosmos-cloud.io/" },
    { n: "Authentik", cat: "identitas", d: 2, desc: "Identity Provider modern — SSO, OAuth2, SAML, LDAP, SCIM dalam satu platform", tags: ["ent→os"], url: "https://goauthentik.io/" },
    { n: "Keycloak", cat: "identitas", d: 3, desc: "IAM enterprise dari Red Hat — paling mature & production-ready untuk autentikasi terpusat", tags: ["ent→os"], url: "https://www.keycloak.org/" },
    { n: "HashiCorp Vault", cat: "identitas", d: 3, desc: "Secrets management — enkripsi, PKI, dynamic credentials, audit log", tags: ["ent→os"], url: "https://www.vaultproject.io/" },
    { n: "Kasm Workspaces", cat: "identitas", d: 2, desc: "Browser & desktop streaming via container — workspace terisolasi untuk keamanan", tags: [], url: "https://kasmweb.com/" },
    { n: "CrowdSec", cat: "keamanan", d: 2, desc: "Collaborative IPS — blokir IP berbahaya secara komunal berdasarkan threat intel global", tags: [], url: "https://www.crowdsec.net/" },
    { n: "Suricata", cat: "keamanan", d: 3, desc: "IDS/IPS network bertenaga — deteksi intrusi berbasis rules, protocol & ML", tags: ["ent→os", "powerful"], url: "https://suricata.io/" },
    { n: "Zeek", cat: "keamanan", d: 3, desc: "Network security monitor — analisis traffic mendalam, dipakai di riset & enterprise", tags: ["powerful"], url: "https://zeek.org/" },
    { n: "OpenVAS / Greenbone", cat: "keamanan", d: 2, desc: "Vulnerability scanner — audit kelemahan infrastruktur sendiri sebelum attacker", tags: ["ent→os"], url: "https://www.greenbone.net/en/community-edition/" },
    { n: "Falco", cat: "keamanan", d: 3, desc: "Runtime security container — deteksi anomali realtime via eBPF di kernel level", tags: ["cncf", "ent→os"], url: "https://falco.org/" },
    { n: "Trivy", cat: "keamanan", d: 1, desc: "Scanner CVE untuk container image, repo Git, Terraform, Kubernetes manifest", tags: ["cncf"], url: "https://trivy.dev/" },
    { n: "TheHive + MISP", cat: "keamanan", d: 3, desc: "Platform SOC lengkap: case management + threat intelligence sharing komunitas global", tags: ["ent→os"], url: "https://thehive-project.org/" },
    { n: "Lynis", cat: "keamanan", d: 1, desc: "Security auditing tool untuk Linux — skor hardening & rekomendasi otomatis", tags: [], url: "https://cisofy.com/lynis/" },
    { n: "Semgrep", cat: "keamanan", d: 2, desc: "SAST (Static Analysis) — temukan bug keamanan di kode sebelum deploy", tags: [], url: "https://semgrep.dev/" },
    { n: "Uptime Kuma", cat: "monitoring", d: 1, desc: "Self-hosted uptime monitoring & status page — alternatif UptimeRobot", tags: [], url: "https://uptime.kuma.pet/" },
    { n: "Grafana + Prometheus", cat: "monitoring", d: 2, desc: "Stack monitoring standar industri — metrics scraping, alerting, & dashboard kelas enterprise", tags: ["ent→os"], url: "https://prometheus.io/" },
    { n: "Loki", cat: "monitoring", d: 2, desc: "Log aggregation dari Grafana Labs — lebih ringan dari Elasticsearch, terintegrasi Grafana", tags: ["ent→os"], url: "https://grafana.com/oss/loki/" },
    { n: "Netdata", cat: "monitoring", d: 1, desc: "Real-time monitoring dengan zero konfigurasi — 1 command install, langsung jalan", tags: [], url: "https://www.netdata.cloud/" },
    { n: "Gotify", cat: "monitoring", d: 1, desc: "Self-hosted push notification server — kirim alert dari server ke device", tags: [], url: "https://gotify.net/" },
    { n: "Diun", cat: "monitoring", d: 1, desc: "Docker Image Update Notifier — alert otomatis saat image baru tersedia", tags: [], url: "https://crazy-max.github.io/diun/" },
    { n: "OpenTelemetry", cat: "monitoring", d: 3, desc: "Framework observability universal — traces, metrics, logs dalam satu standar (CNCF)", tags: ["cncf"], url: "https://opentelemetry.io/" },
    { n: "MinIO", cat: "data", d: 2, desc: "Object storage S3-compatible self-hosted — performa enterprise, dipakai di Fortune 500", tags: ["ent→os"], url: "https://min.io/" },
    { n: "BorgBackup", cat: "data", d: 2, desc: "Backup dengan deduplication & enkripsi — efisiensi storage tinggi untuk data besar", tags: [], url: "https://www.borgbackup.org/" },
    { n: "ClickHouse", cat: "data", d: 3, desc: "OLAP database columnar ultra-cepat — query miliaran baris dalam detik", tags: ["ent→os", "powerful"], url: "https://clickhouse.com/" },
    { n: "TimescaleDB", cat: "data", d: 2, desc: "Time-series database berbasis PostgreSQL — optimal untuk metrics & IoT data", tags: [], url: "https://www.timescale.com/" },
    { n: "Apache Superset", cat: "data", d: 2, desc: "BI & data visualization platform — dari Airbnb, dipakai di production skala besar", tags: ["ent→os"], url: "https://superset.apache.org/" },
    { n: "Debezium", cat: "data", d: 3, desc: "Change Data Capture (CDC) dari Red Hat — stream perubahan database realtime ke Kafka", tags: ["ent→os"], url: "https://debezium.io/" },
    { n: "Apache NiFi", cat: "data", d: 3, desc: "Data flow automation dengan GUI — awalnya dikembangkan oleh NSA untuk data ingestion", tags: ["ent→os", "nsa", "powerful"], url: "https://nifi.apache.org/" },
    { n: "Trino", cat: "data", d: 3, desc: "Distributed SQL query engine — query lintas datasource sekaligus, ex-Facebook (Presto)", tags: ["ent→os"], url: "https://trino.io/" },
    { n: "dbt (data build tool)", cat: "data", d: 2, desc: "Transform data di dalam warehouse — SQL-based, version control, testing otomatis", tags: [], url: "https://www.getdbt.com/" },
    { n: "OpenStack", cat: "warning", d: 4, desc: "Private cloud infrastructure — bangun AWS sendiri dari nol, belajar cloud sesungguhnya", tags: ["ent→os"], url: "https://www.openstack.org/" },
    { n: "Kubernetes 'The Hard Way'", cat: "warning", d: 4, desc: "Setup K8s manual tanpa automasi — pahami setiap komponen, certificate, & etcd cluster", tags: ["cncf"], url: "https://github.com/kelseyhightower/kubernetes-the-hard-way" },
    { n: "Ceph", cat: "warning", d: 4, desc: "Distributed storage platform — object, block, dan file dalam satu sistem terdistribusi", tags: ["ent→os"], url: "https://ceph.io/" },
    { n: "Wazuh / ELK Stack", cat: "warning", d: 4, desc: "SIEM & security analytics — visibilitas penuh: log, alerts, compliance, threat hunting", tags: ["ent→os"], url: "https://wazuh.com/" },
    { n: "SELinux", cat: "warning", d: 4, desc: "Mandatory Access Control di kernel Linux — dikembangkan NSA, keamanan level militer", tags: ["nsa"], url: "https://github.com/SELinuxProject" },
    { n: "eBPF", cat: "warning", d: 4, desc: "Program kernel Linux tanpa modifikasi — networking, security, tracing, performa profiling", tags: ["powerful"], url: "https://ebpf.io/" },
    { n: "Ansible / Terraform", cat: "warning", d: 3, desc: "Infrastructure as Code — deklaratif, reproducible, otomasi ratusan server sekaligus", tags: ["ent→os"], url: "https://www.ansible.com/" },
    { n: "FreeIPA", cat: "warning", d: 4, desc: "Manajemen identitas terpusat Linux — Active Directory versi open-source dari Red Hat", tags: ["ent→os"], url: "https://www.freeipa.org/" },
    { n: "Apache Kafka", cat: "warning", d: 4, desc: "Distributed event streaming platform — pipa data skala masif, lahir dari LinkedIn", tags: ["ent→os"], url: "https://kafka.apache.org/" },
    { n: "FRRouting", cat: "warning", d: 4, desc: "BGP/OSPF routing suite — implementasi routing protocol untuk jadi ISP sendiri", tags: ["powerful"], url: "https://frrouting.org/" },
    { n: "Istio", cat: "danger", d: 5, desc: "Service mesh untuk Kubernetes — observability, traffic management, mutual TLS antar service", tags: ["ent→os", "cncf"], url: "https://istio.io/" },
    { n: "Cilium", cat: "danger", d: 5, desc: "eBPF-based networking & security untuk K8s — next-gen CNI, pengganti iptables", tags: ["cncf", "powerful"], url: "https://cilium.io/" },
    { n: "Rook + Ceph", cat: "danger", d: 5, desc: "Ceph diorkestrasikan oleh Kubernetes — storage cloud-native distributed level production", tags: ["cncf"], url: "https://rook.io/" },
    { n: "Vitess", cat: "danger", d: 5, desc: "Horizontal database sharding untuk MySQL/PostgreSQL — lahir dari YouTube untuk skala global", tags: ["ent→os"], url: "https://vitess.io/" },
    { n: "SPIFFE / SPIRE", cat: "danger", d: 5, desc: "Workload identity & zero-trust authentication antar service — standar industri CNCF", tags: ["cncf"], url: "https://spiffe.io/" },
    { n: "Crossplane", cat: "danger", d: 5, desc: "Universal control plane — manage cloud resources external via Kubernetes CRD", tags: ["cncf"], url: "https://www.crossplane.io/" },
    { n: "Longhorn", cat: "danger", d: 4, desc: "Distributed block storage ringan untuk Kubernetes dari Rancher/SUSE — lebih mudah dari Ceph", tags: ["cncf", "ent→os"], url: "https://longhorn.io/" },
  ];

  let activeCat = 'all';

  function diffDots(d) {
    const colors = ['', '#888780', '#378ADD', '#7F77DD', '#E24B4A', '#A32D2D'];
    const max = 5;
    let s = '';
    for (let i = 1; i <= max; i++) s += `<span style="color:${i <= d ? colors[Math.min(d, 5)] : 'var(--color-border-secondary)'};">●</span>`;
    return s;
  }

  function tagPill(t) {
    const style = TAG_STYLE[t] || 'background:var(--color-background-secondary);color:var(--color-text-secondary)';
    return `<span class="pill" style="${style}">${t}</span>`;
  }

  function renderCards() {
    const q = document.getElementById('search').value.toLowerCase();
    const list = tools.filter(t => {
      const catMatch = activeCat === 'all' || t.cat === activeCat;
      const qMatch = !q || t.n.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(x => x.includes(q));
      return catMatch && qMatch;
    });

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const stats = document.getElementById('stats');

    if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; stats.innerHTML = ''; return; }
    empty.style.display = 'none';

    const catCounts = {};
    list.forEach(t => catCounts[t.cat] = (catCounts[t.cat] || 0) + 1);

    stats.innerHTML = `<span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">// ${list.length} tools</span>` +
      Object.entries(catCounts).map(([c, n]) => `<span style="font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid ${CATS[c].border};color:var(--color-text-secondary);font-family:var(--font-mono)">${CATS[c].label} ×${n}</span>`).join('');

    grid.innerHTML = list.map(t => {
      const c = CATS[t.cat];
      const isWarn = t.cat === 'warning' || t.cat === 'danger';
      return `<div onclick="window.open('${t.url}', '_blank')" style="border-left:3px solid ${c.border};">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-weight:500;font-size:14px;color:var(--color-text-primary);font-family:var(--font-mono);${isWarn ? 'color:var(--color-text-danger)' : ''}">${isWarn && t.cat === 'danger' ? '☠ ' : ''}${t.n}</span>
          <svg class="tool-link-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </div>
        <span style="font-size:12px;letter-spacing:1px;white-space:nowrap;">${diffDots(t.d)}</span>
      </div>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 8px;line-height:1.5;">${t.desc}</p>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">${t.tags.map(tagPill).join('')}</div>
    </div>`;
    }).join('');
  }

  function filter(cat) {
    activeCat = cat;
    document.querySelectorAll('.fBtn').forEach(b => {
      const isActive = b.dataset.cat === cat;
      if (isActive) {
        b.classList.add('active');
      } else {
        b.classList.remove('active');
      }
    });
    renderCards();
  }

  const legend = `<div class="legend">
  <span class="legend-item">● tingkat kesulitan (1–5)</span>
  <span class="pill" style="background:var(--color-background-info);color:var(--color-text-info)">ent→os</span><span style="font-size:11px;color:var(--color-text-secondary)">enterprise → opensource</span>
  <span class="pill" style="background:var(--color-background-warning);color:var(--color-text-warning)">powerful</span><span style="font-size:11px;color:var(--color-text-secondary)">tidak viral tapi dahsyat</span>
  <span class="pill" style="background:var(--color-background-success);color:var(--color-text-success)">cncf</span><span style="font-size:11px;color:var(--color-text-secondary)">cloud native foundation</span>
  <span class="pill" style="background:var(--color-background-danger);color:var(--color-text-danger)">nsa</span><span style="font-size:11px;color:var(--color-text-secondary)">lahir dari NSA/gov</span>
</div>`;
  document.querySelector('.roadmap-wrapper').insertAdjacentHTML('beforeend', legend);

  renderCards();
</script>
<!-- Original Code Ends Here -->
  </div>
</body>
</html>
