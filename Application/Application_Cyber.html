<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity & Homelab Arsenal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2 class="sr-only">Cybersecurity & Homelab Tools — Arsenal Belajar Lengkap</h2>

    <div class="roadmap-wrapper">
      <div class="header-row">
        <span class="header-title">// cyber.arsenal</span>
        <span class="header-subtitle">— dari fondasi networking sampai zero-trust security</span>
      </div>

      <div class="filter-row" id="filters">
        <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
        <button onclick="filter('fondasi')" data-cat="fondasi" class="fBtn">⬡ fondasi</button>
        <button onclick="filter('jaringan')" data-cat="jaringan" class="fBtn">⬡ jaringan</button>
        <button onclick="filter('identitas')" data-cat="identitas" class="fBtn">⬡ identitas</button>
        <button onclick="filter('keamanan')" data-cat="keamanan" class="fBtn">⬡ keamanan</button>
        <button onclick="filter('monitoring')" data-cat="monitoring" class="fBtn">⬡ monitoring</button>
        <button onclick="filter('warning')" data-cat="warning" class="fBtn">⚠ warning zone</button>
        <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠ danger zone</button>
      </div>

      <input type="text" id="search" oninput="renderCards()" placeholder="cari tool..." class="search-input">

      <div id="stats"></div>
      <div id="grid"></div>
      <div id="empty">
        // no results found
      </div>

    </div>
  </div>

  <script>
    const CATS = {
      fondasi: { label: "fondasi", border: "#888780", icon: "⬡" },
      jaringan: { label: "jaringan", border: "#378ADD", icon: "⬡" },
      identitas: { label: "identitas", border: "#7F77DD", icon: "⬡" },
      keamanan: { label: "keamanan", border: "#D85A30", icon: "⬡" },
      monitoring: { label: "monitoring", border: "#639922", icon: "⬡" },
      warning: { label: "⚠ warning zone", border: "#E24B4A", icon: "⚠" },
      danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
    };

    const TAG_MAP = {
      "ent→os": "tag-info",
      "powerful": "tag-warning",
      "cncf": "tag-success",
      "nsa": "tag-danger",
    };

    const tools = [
      // fondasi
      { n: "NixOS", cat: "fondasi", d: 2, url: "https://nixos.org/", desc: "OS deklaratif — seluruh sistem dikonfigurasi via satu file reproducible. Kebal dari konfigurasi yang berantakan.", tags: ["powerful"] },
      { n: "Proxmox VE", cat: "fondasi", d: 1, url: "https://www.proxmox.com/", desc: "Hypervisor tipe-1 gratis untuk VM & LXC container — standar emas untuk homelab & server lokal.", tags: ["ent→os"] },
      { n: "Portainer", cat: "fondasi", d: 1, url: "https://www.portainer.io/", desc: "GUI management Docker & Kubernetes — navigasi container jadi gampang tanpa harus hafal command CLI.", tags: [] },
      { n: "Vaultwarden", cat: "fondasi", d: 1, url: "https://github.com/dani-garcia/vaultwarden", desc: "Server Bitwarden self-hosted — password manager penuh fitur, sangat ringan, dan aman untuk data pribadi.", tags: ["powerful"] },
      { n: "Immich", cat: "fondasi", d: 1, url: "https://immich.app/", desc: "Self-hosted Google Photos — backup foto/video otomatis dengan fitur AI recognition untuk wajah & objek.", tags: ["powerful"] },

      // jaringan
      { n: "OPNsense", cat: "jaringan", d: 2, url: "https://opnsense.org/", desc: "Firewall & router OS berbasis FreeBSD — fitur enterprise: IDS, VPN, traffic shaping, & web filtering.", tags: ["ent→os"] },
      { n: "Tailscale", cat: "jaringan", d: 1, url: "https://tailscale.com/", desc: "Zero config VPN — bangun mesh network antar device dalam hitungan menit tanpa buka port (NAT traversal).", tags: ["powerful"] },
      { n: "Headscale", cat: "jaringan", d: 3, url: "https://github.com/juanfont/headscale", desc: "Self-hosted Tailscale control server — buat yang mau privasi total tanpa lewat server Tailscale.", tags: ["powerful"] },
      { n: "AdGuard Home", cat: "jaringan", d: 1, url: "https://adguard.com/adguard-home.html", desc: "Network-wide ads & tracker blocker — bersihkan semua iklan di semua device lewat DNS.", tags: [] },
      { n: "Netbird", cat: "jaringan", d: 2, url: "https://netbird.io/", desc: "Zero-trust overlay network full self-hosted — mesh VPN dengan akses kontrol yang sangat granular.", tags: ["ent→os"] },

      // identitas
      { n: "Authentik", cat: "identitas", d: 2, url: "https://goauthentik.io/", desc: "Identity Provider modern — SSO, OAuth2, SAML, LDAP, & flow login kustom dalam satu dashboard.", tags: ["ent→os", "powerful"] },
      { n: "Keycloak", cat: "identitas", d: 3, url: "https://www.keycloak.org/", desc: "IAM enterprise dari Red Hat — paling mature & stabil untuk autentikasi terpusat aplikasi besar.", tags: ["ent→os"] },
      { n: "Authelia", cat: "identitas", d: 2, url: "https://www.authelia.com/", desc: "Portal 2FA & SSO yang sangat ringan — cocok banget disandingkan dengan Nginx atau Traefik.", tags: [] },

      // keamanan
      { n: "CrowdSec", cat: "keamanan", d: 2, url: "https://www.crowdsec.net/", desc: "Collaborative IPS — deteksi & blokir IP berbahaya secara otomatis berdasarkan data komunitas global.", tags: ["powerful"] },
      { n: "Wazuh", cat: "keamanan", d: 3, url: "https://wazuh.com/", desc: "The Open Source Security Platform — EDR, SIEM, & compliance monitoring lengkap untuk server & endpoint.", tags: ["ent→os", "powerful"] },
      { n: "Gitleaks", cat: "keamanan", d: 1, url: "https://github.com/gitleaks/gitleaks", desc: "Secret scanning tool — scan repository untuk cari password, API key, atau token yang tidak sengaja ter-commit.", tags: ["powerful"] },
      { n: "DefectDojo", cat: "keamanan", d: 3, url: "https://www.defectdojo.org/", desc: "Vulnerability Management tool — orchestrate semua hasil scan security ke dalam satu dashboard terpusat.", tags: ["ent→os"] },
      { n: "Trivy", cat: "keamanan", d: 1, url: "https://trivy.dev/", desc: "Security scanner paling komprehensif — scan image, config, & dependency dari vulnerability.", tags: ["cncf", "powerful"] },
      { n: "Lynis", cat: "keamanan", d: 1, url: "https://cisofy.com/lynis/", desc: "Security auditing tool untuk Linux — cek hardening OS & dapatkan rekomendasi security otomatis.", tags: [] },

      // monitoring
      { n: "Uptime Kuma", cat: "monitoring", d: 1, url: "https://github.com/louislam/uptime-kuma", desc: "Self-hosted status page — monitoring website, service, & port dengan notifikasi multi-channel.", tags: ["powerful"] },
      { n: "Netdata", cat: "monitoring", d: 1, url: "https://www.netdata.cloud/", desc: "Real-time monitoring zero-config — install satu command, langsung lihat ribuan metrics dashboard server.", tags: [] },
      { n: "Zabbix", cat: "monitoring", d: 3, url: "https://www.zabbix.com/", desc: "Enterprise monitoring legendaris — sangat fleksibel untuk monitoring jaringan, server, & IoT.", tags: ["ent→os"] },

      // warning
      { n: "SELinux", cat: "warning", d: 4, url: "https://github.com/SELinuxProject", desc: "Mandatory Access Control — keamanan level kernel militer (NSA) yang bikin hacker garuk kepala.", tags: ["nsa"] },
      { n: "Kubernetes 'Hard Way'", cat: "warning", d: 4, url: "https://github.com/kelseyhightower/kubernetes-the-hard-way", desc: "Setup K8s tanpa automasi — pahami cara kerja certificate, etcd, & control plane secara mendalam.", tags: ["cncf"] },
      { n: "OpenVAS", cat: "warning", d: 3, url: "https://www.openvas.org/", desc: "Vulnerability scanner paling populer — scan kelemahan network sebelum hacker yang nemuin.", tags: ["ent→os"] },

      // danger
      { n: "Cilium", cat: "danger", d: 5, url: "https://cilium.io/", desc: "eBPF-based networking & security — CNI tercanggih untuk Kubernetes dengan policy security level kernel.", tags: ["cncf", "powerful"] },
      { n: "Ghidra", cat: "danger", d: 5, url: "https://ghidra-sre.org/", desc: "Reverse Engineering suite dari NSA — bedah malware & biner program sampai ke akarnya.", tags: ["nsa", "powerful"] },
      { n: "PC-3000", cat: "danger", d: 5, url: "https://www.acelab.eu.com/pc3000.php", desc: "The King of Data Recovery — tool hardware lab untuk perbaiki firmware & ambil data dari disk mati.", tags: ["powerful"] },
    ];

    let activeCat = 'all';

    function diffDots(d) {
      const colors = ['', '#888780', '#378ADD', '#7F77DD', '#E24B4A', '#A32D2D'];
      let s = '';
      for (let i = 1; i <= 5; i++) {
        const color = i <= d ? colors[Math.min(d, 5)] : 'var(--color-border-secondary)';
        s += `<span style="color:${color};">●</span>`;
      }
      return s;
    }

    function renderCards() {
      const q = document.getElementById('search').value.toLowerCase();
      const list = tools.filter(t => {
        const catMatch = activeCat === 'all' || t.cat === activeCat;
        const qMatch = !q || t.n.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.tags && t.tags.some(x => x.includes(q)));
        return catMatch && qMatch;
      });

      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      if (!list.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        stats.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      const catCounts = {};
      list.forEach(t => catCounts[t.cat] = (catCounts[t.cat] || 0) + 1);

      stats.innerHTML = `<span class="stats-count">// ${list.length} tools</span>` +
        Object.entries(catCounts).map(([c, n]) =>
          `<span class="stats-tag" style="border-color:${CATS[c].border}; color:${CATS[c].border}; background: ${CATS[c].border}15">${CATS[c].label} ×${n}</span>`
        ).join('');

      grid.innerHTML = list.map(t => {
        const c = CATS[t.cat];
        const isWarn = t.cat === 'warning' || t.cat === 'danger';

        return `
          <div class="tool-card" onclick="window.open('${t.url}', '_blank')" style="border-left-color: ${c.border}">
            <div class="card-header">
              <div class="card-title-wrapper">
                <span style="color:${c.border}; font-size:14px;">${c.icon}</span>
                <span class="card-title ${isWarn ? 'text-danger' : ''}">${t.n}</span>
                <svg class="tool-link-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </div>
              <span style="font-size:12px;letter-spacing:1px;white-space:nowrap;">${diffDots(t.d)}</span>
            </div>
            <p class="card-desc">${t.desc}</p>
            <div class="tag-container">
              ${t.tags.map(tag => `<span class="tag-pill ${TAG_MAP[tag] || 'tag-default'}">${tag}</span>`).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function filter(cat) {
      activeCat = cat;
      document.querySelectorAll('.fBtn').forEach(b => {
        const bCat = b.dataset.cat;
        if (bCat === cat) {
          b.classList.add('active');
          if (bCat !== 'all') b.style.borderColor = CATS[bCat].border;
        } else {
          b.classList.remove('active');
          if (bCat !== 'all') b.style.borderColor = 'var(--color-border-secondary)';
        }
      });
      renderCards();
    }

    // Initialize button colors
    document.querySelectorAll('.fBtn').forEach(b => {
      const bCat = b.dataset.cat;
      if (bCat !== 'all') {
        b.style.color = CATS[bCat].border;
        b.addEventListener('mouseenter', () => { if(!b.classList.contains('active')) b.style.background = CATS[bCat].border + '20'; });
        b.addEventListener('mouseleave', () => { if(!b.classList.contains('active')) b.style.background = 'var(--color-background-secondary)'; });
      }
    });

    const legend = `<div class="legend">
      <span class="legend-item">● tingkat kesulitan (1–5)</span>
      <div class="legend-group">
        <span class="tag-pill tag-info">ent→os</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">enterprise → opensource</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-warning">powerful</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">tidak viral tapi dahsyat</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-success">cncf</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">cloud native foundation</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-danger">nsa</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">lahir dari NSA/militer</span>
      </div>
    </div>`;
    document.querySelector('.roadmap-wrapper').insertAdjacentHTML('beforeend', legend);

    renderCards();
  </script>
</body>

</html>
