<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Engineering & Analytics Arsenal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2 class="sr-only">Data Engineering & Analytics Tools — Arsenal Belajar Lengkap</h2>

    <div class="roadmap-wrapper">
      <div class="header-row">
        <span class="header-title">// data.arsenal</span>
        <span class="header-subtitle">— arsitektur data dari ingestion hingga visualisasi cerdas</span>
      </div>

      <div class="filter-row" id="filters">
        <button onclick="filter('all')" data-cat="all" class="fBtn active">semua</button>
        <button onclick="filter('database')" data-cat="database" class="fBtn">⬡ database</button>
        <button onclick="filter('orchestration')" data-cat="orchestration" class="fBtn">⬡ orchestration</button>
        <button onclick="filter('transform')" data-cat="transform" class="fBtn">⬡ transform</button>
        <button onclick="filter('visualization')" data-cat="visualization" class="fBtn">⬡ visualization</button>
        <button onclick="filter('quality')" data-cat="quality" class="fBtn">⬡ quality</button>
        <button onclick="filter('streaming')" data-cat="streaming" class="fBtn">⬡ streaming</button>
        <button onclick="filter('warning')" data-cat="warning" class="fBtn">⚠ warning zone</button>
        <button onclick="filter('danger')" data-cat="danger" class="fBtn">☠ danger zone</button>
      </div>

      <input type="text" id="search" oninput="renderCards()" placeholder="cari tool..." class="search-input">

      <div id="stats"></div>
      <div id="grid"></div>
      <div id="empty">
        // no results found
      </div>

    </div>
  </div>

  <script>
    const CATS = {
      database: { label: "database", border: "#378ADD", icon: "⬡" },
      orchestration: { label: "orchestration", border: "#639922", icon: "⬡" },
      transform: { label: "transform", border: "#BA7517", icon: "⬡" },
      visualization: { label: "visualization", border: "#7F77DD", icon: "⬡" },
      quality: { label: "quality", border: "#888780", icon: "⬡" },
      streaming: { label: "streaming", border: "#D85A30", icon: "⬡" },
      warning: { label: "⚠ warning zone", border: "#E24B4A", icon: "⚠" },
      danger: { label: "☠ danger zone", border: "#A32D2D", icon: "☠" },
    };

    const TAG_MAP = {
      "ent→os": "tag-info",
      "powerful": "tag-warning",
      "apache": "tag-success",
      "faang": "tag-danger",
    };

    const tools = [
      // database
      { n: "PostgreSQL", cat: "database", d: 2, url: "https://www.postgresql.org/", desc: "Database relasional paling advanced — JSONB, full-text search, extensible, ACID sempurna.", tags: ["powerful"] },
      { n: "DuckDB", cat: "database", d: 1, url: "https://duckdb.org/", desc: "Analytical database in-process — query CSV/Parquet langsung, zero server, secepat Spark untuk <10GB.", tags: ["powerful"] },
      { n: "MotherDuck", cat: "database", d: 2, url: "https://motherduck.com/", desc: "Cloud data warehouse bertenaga DuckDB — serverless, seamless hybrid execution, sangat powerful untuk analisis cepat.", tags: ["powerful"] },
      { n: "ClickHouse", cat: "database", d: 3, url: "https://clickhouse.com/", desc: "Columnar OLAP tercepat — query miliaran baris dalam detik, kompresi data ekstrem.", tags: ["ent→os", "powerful"] },
      { n: "TimescaleDB", cat: "database", d: 2, url: "https://www.timescale.com/", desc: "Time-series database di atas PostgreSQL — optimal untuk metrics, IoT, dan data finansial.", tags: [] },
      { n: "Redis", cat: "database", d: 1, url: "https://redis.io/", desc: "In-memory key-value store — caching, pub/sub, rate limiter, session store.", tags: [] },
      { n: "MinIO", cat: "database", d: 2, url: "https://min.io/", desc: "S3-compatible object storage self-hosted — fondasi data lake layer dengan versioning.", tags: ["ent→os"] },

      // orchestration
      { n: "Apache Airflow", cat: "orchestration", d: 3, url: "https://airflow.apache.org/", desc: "DAG-based workflow orchestration — standar industri DE untuk scheduling & dependency.", tags: ["apache", "ent→os"] },
      { n: "Dagster", cat: "orchestration", d: 2, url: "https://dagster.io/", desc: "Modern data orchestrator — software-defined assets, type checking, dan built-in lineage.", tags: ["powerful"] },
      { n: "Apache Hop", cat: "orchestration", d: 2, url: "https://hop.apache.org/", desc: "Visual data orchestration — penerus Kettle (PDI) yang modern & metadata-driven.", tags: ["apache", "powerful"] },
      { n: "Kestra", cat: "orchestration", d: 2, url: "https://kestra.io/", desc: "Event-driven orchestration platform — YAML-based, UI visual editor, sangat skalabel.", tags: ["powerful"] },
      { n: "Mage", cat: "orchestration", d: 1, url: "https://www.mage.ai/", desc: "Data pipeline tool dengan notebook-style UI — ELT, streaming, visual debugging.", tags: [] },

      // transform
      { n: "dbt", cat: "transform", d: 2, url: "https://www.getdbt.com/", desc: "SQL-based transformation — testing, documentation, dan lineage dalam version control.", tags: ["powerful"] },
      { n: "Polars", cat: "transform", d: 2, url: "https://www.pola.rs/", desc: "DataFrame library Rust-powered — 100x lebih cepat dari pandas, multi-threaded execution.", tags: ["powerful"] },
      { n: "pandas", cat: "transform", d: 1, url: "https://pandas.pydata.org/", desc: "Python DataFrame standar — manipulasi data tabular dengan ecosystem yang masif.", tags: [] },
      { n: "Apache Spark", cat: "transform", d: 3, url: "https://spark.apache.org/", desc: "Distributed data processing — standar emas batch & streaming untuk data skala petabyte.", tags: ["apache", "ent→os"] },
      { n: "SeaTunnel", cat: "transform", d: 2, url: "https://seatunnel.apache.org/", desc: "Next-gen high-performance data integration — sinkronisasi data antar 100+ source/sink.", tags: ["apache", "powerful"] },

      // visualization
      { n: "Apache Superset", cat: "visualization", d: 2, url: "https://superset.apache.org/", desc: "BI platform modern — dashboard interaktif, SQL lab, dan chart builder kelas enterprise.", tags: ["apache", "ent→os", "faang"] },
      { n: "Metabase", cat: "visualization", d: 1, url: "https://www.metabase.com/", desc: "BI self-hosted paling user-friendly — auto-detect schema & natural language query.", tags: ["ent→os"] },
      { n: "Grafana", cat: "visualization", d: 2, url: "https://grafana.com/", desc: "Dashboard multi-datasource — metrics, logs, traces visualization, alerting built-in.", tags: ["ent→os"] },
      { n: "Streamlit", cat: "visualization", d: 1, url: "https://streamlit.io/", desc: "Python framework untuk data apps — ubah script data menjadi web app dalam hitungan menit.", tags: [] },

      // quality
      { n: "Great Expectations", cat: "quality", d: 2, url: "https://greatexpectations.io/", desc: "Data quality framework — expectations, validation suites, profiling, dan auto-docs.", tags: ["powerful"] },
      { n: "DataHub", cat: "quality", d: 3, url: "https://datahubproject.io/", desc: "Data catalog & governance dari LinkedIn — metadata, lineage, ownership, dan search.", tags: ["faang", "ent→os"] },
      { n: "LakeFS", cat: "quality", d: 3, url: "https://lakefs.io/", desc: "Git for Data — berikan fitur branch, commit, & merge pada object storage (S3/GCS/Minio).", tags: ["powerful"] },

      // streaming
      { n: "Apache Kafka", cat: "streaming", d: 3, url: "https://kafka.apache.org/", desc: "Distributed event streaming — standar industri untuk data pipeline real-time skalabel.", tags: ["apache", "ent→os"] },
      { n: "Redpanda", cat: "streaming", d: 2, url: "https://redpanda.com/", desc: "Kafka-compatible C++ — lebih cepat, tanpa JVM, dan sangat hemat resource.", tags: ["powerful"] },
      { n: "RisingWave", cat: "streaming", d: 2, url: "https://risingwave.com/", desc: "Streaming database — SQL-based streaming analytics semudah query PostgreSQL.", tags: ["powerful"] },
      { n: "StreamPark", cat: "streaming", d: 2, url: "https://streampark.apache.org/", desc: "Platform manajemen Flink/Spark — permudah development & operasi streaming apps.", tags: ["apache", "powerful"] },

      // warning
      { n: "Delta Lake", cat: "warning", d: 3, url: "https://delta.io/", desc: "ACID transactions di data lake — time travel, schema enforcement, dan upsert/merge.", tags: ["faang", "powerful"] },
      { n: "Apache Iceberg", cat: "warning", d: 3, url: "https://iceberg.apache.org/", desc: "Open table format — schema evolution, hidden partitioning, snapshot isolation.", tags: ["apache", "powerful"] },
      { n: "Databricks", cat: "warning", d: 4, url: "https://www.databricks.com/", desc: "Lakehouse platform — unified batch + streaming dengan Delta Lake & MLflow terintegrasi.", tags: ["faang", "ent→os"] },

      // danger
      { n: "Apache Beam", cat: "danger", d: 5, url: "https://beam.apache.org/", desc: "Unified batch + streaming SDK — tulis logika sekali, jalankan di Spark/Flink/Dataflow.", tags: ["apache", "faang"] },
      { n: "StarRocks", cat: "danger", d: 5, url: "https://www.starrocks.io/", desc: "Next-gen OLAP database — secepat ClickHouse dengan support JOIN yang sangat powerful.", tags: ["powerful"] },
      { n: "Apache Druid", cat: "danger", d: 5, url: "https://druid.apache.org/", desc: "Real-time OLAP database — sub-second query pada data skala petabyte.", tags: ["apache", "faang"] },
    ];

    let activeCat = 'all';

    function diffDots(d) {
      const colors = ['', '#888780', '#378ADD', '#7F77DD', '#E24B4A', '#A32D2D'];
      let s = '';
      for (let i = 1; i <= 5; i++) {
        const color = i <= d ? colors[Math.min(d, 5)] : 'var(--color-border-secondary)';
        s += `<span style="color:${color};">●</span>`;
      }
      return s;
    }

    function renderCards() {
      const q = document.getElementById('search').value.toLowerCase();
      const list = tools.filter(t => {
        const catMatch = activeCat === 'all' || t.cat === activeCat;
        const qMatch = !q || t.n.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.tags && t.tags.some(x => x.includes(q)));
        return catMatch && qMatch;
      });

      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      if (!list.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        stats.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      const catCounts = {};
      list.forEach(t => catCounts[t.cat] = (catCounts[t.cat] || 0) + 1);

      stats.innerHTML = `<span class="stats-count">// ${list.length} tools</span>` +
        Object.entries(catCounts).map(([c, n]) =>
          `<span class="stats-tag" style="border-color:${CATS[c].border}">${CATS[c].label} ×${n}</span>`
        ).join('');

      grid.innerHTML = list.map(t => {
        const c = CATS[t.cat];
        const isWarn = t.cat === 'warning' || t.cat === 'danger';

        return `
          <div class="tool-card" onclick="window.open('${t.url}', '_blank')" style="border-left-color: ${c.border}">
            <div class="card-header">
              <div class="card-title-wrapper">
                <span class="card-title ${isWarn ? 'text-danger' : ''}">${t.cat === 'danger' ? '☠ ' : ''}${t.n}</span>
                <svg class="tool-link-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </div>
              <span style="font-size:12px;letter-spacing:1px;white-space:nowrap;">${diffDots(t.d)}</span>
            </div>
            <p class="card-desc">${t.desc}</p>
            <div class="tag-container">
              ${t.tags.map(tag => `<span class="tag-pill ${TAG_MAP[tag] || 'tag-default'}">${tag}</span>`).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function filter(cat) {
      activeCat = cat;
      document.querySelectorAll('.fBtn').forEach(b => {
        if (b.dataset.cat === cat) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }
      });
      renderCards();
    }

    const legend = `<div class="legend">
      <span class="legend-item">● tingkat kesulitan (1–5)</span>
      <div class="legend-group">
        <span class="tag-pill tag-info">ent→os</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">enterprise → opensource</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-warning">powerful</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">tidak viral tapi dahsyat</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-success">apache</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">Apache Software Foundation</span>
      </div>
      <div class="legend-group">
        <span class="tag-pill tag-danger">faang</span>
        <span class="legend-label" style="font-size:11px;color:var(--color-text-secondary)">lahir dari big tech</span>
      </div>
    </div>`;
    document.querySelector('.roadmap-wrapper').insertAdjacentHTML('beforeend', legend);

    renderCards();
  </script>
</body>

</html>
